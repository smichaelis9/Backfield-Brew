<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Backfield Brew – Player Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="styles.css?v=2" />
  <script defer src="script.js?v=16"></script>
</head>

<body>
  <header class="site-header">
  <img src="BFB-Logo.png" alt="Backfield Brew" class="site-logo" />
</header>

<div class="header-buttons">
  <a href="index.html" id="backToRankings" style="display:none;">← Rankings</a>

  <a href="archive.html">Archived Players</a>

  <a href="https://www.patreon.com/BackfieldBrew"
     target="_blank"
     rel="noopener">
     Patreon
  </a>

  <div class="dropdown-nav">

    <button class="dropdown-button">
      Other Pages ▼
    </button>

    <div class="dropdown-content">
      <a href="depth.html">Organizational Depth Chart</a>
      <a href="logs.html">Scouting Logs</a>
      <a href="draft.html">Draft History</a>
      <a href="international.html">International History</a>
    </div>

  </div>

</div>

  <main class="container">
    <section id="playerHero" class="card" data-access="rankings">
      Loading player...
    </section>

    <div class="two-col">
      <section id="bioCard" class="card" data-access="rankings">
        Loading biography...
      </section>

      <section id="toolsCard" class="card" data-access="premium">
        Loading tools...
      </section>
    </div>

    <section id="statsCard" class="card" data-access="premium">
      Loading stats...
    </section>
  </main>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    initPlayerPage();
    handleHeaderButtons();
  });
</script>
</body>
</html>
