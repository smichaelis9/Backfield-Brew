<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Backfield Brew – Player Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="styles.css" />
  <script defer src="script.js"></script>
</head>

<body>
  <header class="site-header">
    <img src="logo.png" alt="Backfield Brew" class="site-logo" />

    <div class="site-nav">
      <a href="index.html" id="backToRankings" style="display:none;">← Rankings</a>
      <a href="https://www.patreon.com/BackfieldBrew" target="_blank" rel="noopener">Patreon</a>
    </div>
  </header>

  <main class="container">
    <section id="playerHero" class="card">
      Loading player...
    </section>

    <div class="two-col">
      <section id="bioCard" class="card">
        Loading biography...
      </section>

      <section id="toolsCard" class="card">
        Loading tools...
      </section>
    </div>

    <section id="statsCard" class="card">
      Loading stats...
    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      initPlayerPage();
      handleHeaderButtons();
    });
  </script>
</body>
</html>
