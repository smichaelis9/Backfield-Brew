<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Backfield Brew – Archived Players</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="styles.css?v=2" />
  <script defer src="script.js?v=16"></script>
</head>

<body>
  <header class="site-header">
    <img src="BFB-Logo.png" alt="Backfield Brew" class="site-logo" />
  </header>

  <div class="header-buttons">
    <a href="index.html">Active Rankings</a>
    <a href="https://www.patreon.com/BackfieldBrew" target="_blank" rel="noopener">Patreon</a>
    <a href="logs.html">Scouting Logs</a>
    <a href="depth.html">Organizational Depth Chart</a>
  </div>

  <main class="container">
    <section class="card">
      <div class="filter-grid">
        <input type="text" id="searchBox" placeholder="Search archived player..." />

        <select id="typeFilter">
          <option value="">All Types</option>
          <option value="hitter">Hitters</option>
          <option value="pitcher">Pitchers</option>
        </select>

        <select id="positionFilter"></select>
        <select id="levelFilter"></select>
      </div>
    </section>

    <section class="card">
      <div class="ranking-scroll">
        <table id="rankingTable">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Player</th>
              <th>OFP</th>
              <th>Pos</th>
              <th>Height</th>
              <th>Weight</th>
              <th>Archive Reason</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <p id="status">Loading archived players...</p>
    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      initArchivePage();
      handleHeaderButtons();
    });
  </script>
</body>
</html>
