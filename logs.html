</head>

<body>
  <!-- =========================
       HEADER
  ========================== -->
  <header class="site-header">
  <img src="BFB-Logo.png" alt="Backfield Brew" class="site-logo" />
</header>

<div class="header-buttons">

  <a href="index.html">Active Rankings</a>

  <a href="archive.html">Archived Players</a>

  <a href="https://www.patreon.com/BackfieldBrew"
     target="_blank"
     rel="noopener">

  <div class="dropdown-nav">

    <button class="dropdown-button">
      Other Pages ▼
    </button>

    <div class="dropdown-content">

  <!-- =========================
       MAIN
  ========================== -->
  <main class="container" data-access="rankings">

    <!-- =========================
         FILTERS
    ========================== -->
    <section class="card">
      <div class="filter-grid logs-filter-grid">
        <input type="text" id="logSearchBox" placeholder="Search player..." />

        <select id="logTypeFilter">
          <option value="">All Updates</option>
          <option value="Scouting Notes">Scouting Notes</option>
          <option value="Full Scouting Reports">Full Scouting Reports</option>
          <option value="OFP">OFP</option>
          <option value="Tools">Tools</option>
        </select>
      </div>
    </section>

    <!-- =========================
         RANKING TABLE
    ========================== -->
    <div class="card">
      <table id="logsTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Type</th>
            <th>Player</th>
            <th>Update</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
