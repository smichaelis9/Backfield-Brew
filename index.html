<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Backfield Brew – Rankings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="styles.css?v=2" />
  <script defer src="script.js?v=16"></script>
</head>

<body>
  <!-- =========================
       HEADER
  ========================== -->
  <header class="site-header">
  <img src="BFB-Logo.png" alt="Backfield Brew" class="site-logo" />
</header>

<div class="header-buttons">
  <a href="index.html" id="backToRankings" style="display:none;">← Rankings</a>

  <a href="archive.html">Archived Players</a>

  <a href="https://www.patreon.com/BackfieldBrew"
     target="_blank"
     rel="noopener">
     Patreon
  </a>

  <div class="dropdown-nav">

    <button class="dropdown-button">
      Other Pages ▼
    </button>

    <div class="dropdown-content">
      <a href="logs.html">Scouting Logs</a>
      <a href="depth.html">Organizational Depth Chart</a>
      <a href="rule5.html">Rule 5 Eligibility</a>
      <a href="freeagency.html">MiLB Free Agency</a>
      <a href="draft.html">Draft History</a>
      <a href="international.html">International History</a>
    </div>

  </div>

</div>
  <!-- =========================
       MAIN
  ========================== -->
  <main class="container" data-access="rankings">

    <!-- =========================
         FILTERS
    ========================== -->
    <section class="card">
      <div class="filter-grid">
        <input type="text" id="searchBox" placeholder="Search player..." />

        <select id="typeFilter">
          <option value="">All Types</option>
          <option value="hitter">Hitters</option>
          <option value="pitcher">Pitchers</option>
        </select>

        <select id="positionFilter"></select>
        <select id="levelFilter"></select>
      </div>
    </section>

    <!-- =========================
         RANKING TABLE
    ========================== -->
    <section class="card">
      <div class="ranking-scroll">
        <table id="rankingTable">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Player</th>
              <th>OFP</th>
              <th>Risk</th>
              <th>Trending</th>
              <th>Pos</th>
              <th>Level</th>
              <th>Age</th>
              <th>Height</th>
              <th>Weight</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <p id="status"></p>
    </section>

  </main>

  <!-- =========================
       INIT SCRIPT
  ========================== -->
 <script>
  document.addEventListener("DOMContentLoaded", () => {
    initRankingPage();
    handleHeaderButtons();
    setupMobileDropdown();
  });
</script>
</body>
</html>
