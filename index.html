<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Backfield Brew Prospect Rankings</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="site-header">
  <a href="index.html" class="logo-link">
    <img src="BFB-Logo.png" alt="Backfield Brew" class="site-logo">
  </a>

  <nav class="site-nav">
    <a href="index.html">Rankings</a>
    <a href="https://www.patreon.com/BackfieldBrew" target="_blank" rel="noopener">
      Patreon
    </a>
  </nav>
</header>

  <main class="container">
    <section class="controls-card">
      <input id="searchBox" type="search" placeholder="Search player, position, level, country..." />
      <select id="typeFilter">
        <option value="">All Players</option>
        <option value="Hitter">Hitters</option>
        <option value="Pitcher">Pitchers</option>
      </select>
      <select id="positionFilter">
        <option value="">All Positions</option>
      </select>
      <select id="levelFilter">
        <option value="">All Levels</option>
      </select>
    </section>

    <section class="table-card">
      <div id="status" class="status">Loading rankings...</div>
      <div class="table-wrap">
        <table id="rankingTable">
          <thead>
            <tr>
              <th data-sort="Rank">Rank</th>
              <th data-sort="Player">Player</th>
              <th data-sort="Position">Pos</th>
              <th data-sort="Level">Level</th>
              <th data-sort="Age">Age</th>
              <th data-sort="OFP">OFP</th>
              <th data-sort="Risk">Risk</th>
              <th data-sort="Acquired">Acquired</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', initRankingPage);
  </script>
</body>
</html>
